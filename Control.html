<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
	<title>Control Remoto Assessmen</title>
	<style>
		body {
			background: linear-gradient(180deg, #28609a 60%, #173d66 100%);
			color: #4fa2e0;
			font-family: 'Manrope', Arial, sans-serif;
			margin: 0;
			min-height: 100vh;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: flex-start;
		}
		.control-title {
			margin-top: 24px;
			margin-bottom: 18px;
			font-size: 2.2em;
			font-weight: 700;
			background: #173d66;
			padding: 10px 32px;
			border-radius: 8px;
			color: #4fa2e0;
			box-shadow: 0 2px 8px #0003;
			letter-spacing: 0.04em;
		}
		.control-row {
			display: flex;
			gap: 18px;
			margin-bottom: 18px;
			width: 100%;
			justify-content: center;
		}
		.control-btn {
			width: 44vw;
			max-width: 220px;
			height: 110px;
			background: #111;
			border-radius: 16px;
			display: flex;
			align-items: center;
			justify-content: center;
			cursor: pointer;
			transition: background 0.2s, box-shadow 0.2s;
			border: none;
			box-shadow: 0 4px 16px #0002;
		}
		.control-btn:active {
			background: #222;
			box-shadow: 0 2px 8px #0004;
		}
		.arrow {
			width: 70px;
			height: 70px;
			fill: #4fa2e0;
		}
		.control-numbers {
			display: flex;
			gap: 12px;
			margin-top: 8px;
			flex-wrap: wrap;
			justify-content: center;
		}
		.number-btn {
			width: 60px;
			height: 48px;
			background: #111;
			color: #4fa2e0;
			font-size: 1.35em;
			font-weight: 700;
			border-radius: 8px;
			display: flex;
			align-items: center;
			justify-content: center;
			margin: 0;
			border: none;
			cursor: pointer;
			transition: background 0.2s, box-shadow 0.2s;
			box-shadow: 0 2px 8px #0002;
		}
		.number-btn:active {
			background: #222;
			box-shadow: 0 1px 4px #0004;
		}
		.speak-remote {
			margin-top: 18px;
			width: 100%;
			display: flex;
			justify-content: center;
		}
		.speak-btn {
			width: 90vw;
			max-width: 340px;
			height: 54px;
			background: #111;
			color: #7fd3ff;
			font-size: 1.15em;
			font-weight: 800;
			border-radius: 12px;
			border: 1px solid #2e78b1;
			cursor: pointer;
			transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
			box-shadow: 0 2px 8px #0002;
		}
		.speak-btn:active {
			background: #1a1a1a;
			transform: translateY(-2px);
			box-shadow: 0 1px 4px #0004;
		}
		@media (max-width: 600px) {
			.control-title {
				font-size: 1.3em;
				padding: 8px 12px;
			}
			.control-btn {
				width: 44vw;
				max-width: 180px;
				height: 90px;
			}
			.arrow {
				width: 48px;
				height: 48px;
			}
			.number-btn {
				width: 44px;
				height: 36px;
				font-size: 1em;
			}
			.speak-btn {
				height: 44px;
				font-size: 1em;
			}
		}
	</style>
</head>
<body>
	<div class="control-title">Control Remoto</div>
	<div class="control-row">
		<button class="control-btn" id="leftBtn" aria-label="Anterior">
			<svg class="arrow" viewBox="0 0 120 120">
				<polygon points="80,20 40,60 80,100 60,100 20,60 60,20" />
			</svg>
		</button>
		<button class="control-btn" id="rightBtn" aria-label="Siguiente">
			<svg class="arrow" viewBox="0 0 120 120">
				<polygon points="40,20 80,60 40,100 60,100 100,60 60,20" />
			</svg>
		</button>
	</div>
	<div class="control-numbers">
		<button class="number-btn" aria-label="Ir a sección 1">1</button>
		<button class="number-btn" aria-label="Ir a sección 2">2</button>
		<button class="number-btn" aria-label="Ir a sección 3">3</button>
		<button class="number-btn" aria-label="Ir a sección 4">4</button>
		<button class="number-btn" aria-label="Ir a sección 5">5</button>
		<button class="number-btn" aria-label="Ir a sección 6">6</button>
	</div>
	<div class="speak-remote">
		<button class="speak-btn" id="speakBtn" type="button">🔊 Escuchar resumen</button>
	</div>
	<!-- Firebase SDKs -->
	<script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-app-compat.js"></script>
	<script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-database-compat.js"></script>
	<script>
		// Configuración de Firebase
		const firebaseConfig = {
			apiKey: "AIzaSyBac1VZn1kRfIu4rMSvd3MymJ0myCPgmHg",
			authDomain: "presentacion-be908.firebaseapp.com",
			databaseURL: "https://presentacion-be908-default-rtdb.firebaseio.com",
			projectId: "presentacion-be908",
			storageBucket: "presentacion-be908.firebasestorage.app",
			messagingSenderId: "912832356787",
			appId: "1:912832356787:web:f0fcf115bdb41aff016bc6",
			measurementId: "G-LWSRES411H"
		};

		firebase.initializeApp(firebaseConfig);
		const db = firebase.database();

		function sendCommand(cmd) {
			db.ref('control/comando').set({
				value: cmd,
				timestamp: Date.now()
			});
		}

		document.getElementById('leftBtn').onclick = () => sendCommand('left');
		document.getElementById('rightBtn').onclick = () => sendCommand('right');
		document.getElementById('speakBtn').onclick = () => sendCommand('speak');
		Array.from(document.getElementsByClassName('number-btn')).forEach((btn, idx) => {
			btn.onclick = () => sendCommand('number-' + (idx + 1));
		});
	</script>
</body>
</html>
