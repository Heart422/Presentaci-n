<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Control Remoto Assessmen</title>
	<style>
		body {
			background: #28609a;
			color: #4fa2e0;
			font-family: 'Manrope', Arial, sans-serif;
			margin: 0;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			height: 100vh;
		}
		.control-title {
			margin-top: 32px;
			margin-bottom: 24px;
			font-size: 2.6em;
			font-weight: 700;
			background: #173d66;
			padding: 12px 48px;
			border-radius: 8px;
			color: #4fa2e0;
		}
		.control-row {
			display: flex;
			gap: 48px;
			margin-bottom: 32px;
		}
		.control-btn {
			width: 260px;
			height: 160px;
			background: #111;
			border-radius: 12px;
			display: flex;
			align-items: center;
			justify-content: center;
			cursor: pointer;
			transition: background 0.2s;
			border: none;
		}
		.control-btn:hover {
			background: #222;
		}
		.arrow {
			width: 120px;
			height: 120px;
			fill: #4fa2e0;
		}
		.control-numbers {
			display: flex;
			gap: 32px;
			margin-top: 18px;
		}
		.number-btn {
			width: 90px;
			height: 70px;
			background: #111;
			color: #4fa2e0;
			font-size: 2em;
			font-weight: 700;
			border-radius: 6px;
			display: flex;
			align-items: center;
			justify-content: center;
			margin: 0;
			border: none;
			cursor: pointer;
			transition: background 0.2s;
		}
		.number-btn:hover {
			background: #222;
		}
	</style>
</head>
<body>
	<!-- <div class="control-title">OK</div> -->
	<div class="control-row">
		<button class="control-btn" id="leftBtn">
			<svg class="arrow" viewBox="0 0 120 120">
				<polygon points="80,20 40,60 80,100 60,100 20,60 60,20" />
			</svg>
		</button>
		<button class="control-btn" id="rightBtn">
			<svg class="arrow" viewBox="0 0 120 120">
				<polygon points="40,20 80,60 40,100 60,100 100,60 60,20" />
			</svg>
		</button>
	</div>
	<div class="control-numbers">
		<button class="number-btn">1</button>
		<button class="number-btn">2</button>
		<button class="number-btn">3</button>
		<button class="number-btn">4</button>
		<button class="number-btn">5</button>
		<button class="number-btn">6</button>
	</div>
	<!-- Firebase SDKs -->
	<script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-app-compat.js"></script>
	<script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-database-compat.js"></script>
	<script>
		// Configuración de Firebase
		const firebaseConfig = {
			apiKey: "AIzaSyBac1VZn1kRfIu4rMSvd3MymJ0myCPgmHg",
			authDomain: "presentacion-be908.firebaseapp.com",
			databaseURL: "https://presentacion-be908-default-rtdb.firebaseio.com",
			projectId: "presentacion-be908",
			storageBucket: "presentacion-be908.firebasestorage.app",
			messagingSenderId: "912832356787",
			appId: "1:912832356787:web:f0fcf115bdb41aff016bc6",
			measurementId: "G-LWSRES411H"
		};

		firebase.initializeApp(firebaseConfig);
		const db = firebase.database();

		function sendCommand(cmd) {
			db.ref('control/comando').set({
				value: cmd,
				timestamp: Date.now()
			});
		}

		document.getElementById('leftBtn').onclick = () => sendCommand('left');
		document.getElementById('rightBtn').onclick = () => sendCommand('right');
		Array.from(document.getElementsByClassName('number-btn')).forEach((btn, idx) => {
			btn.onclick = () => sendCommand('number-' + (idx + 1));
		});
	</script>
</body>
</html>
