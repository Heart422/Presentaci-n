<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Control Remoto Assessmen</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;900&display=swap" rel="stylesheet">
  <style>
    html, body {
      height: 100%;
      min-height: 100vh;
    }
    body {
      min-height: 100vh;
      height: 100vh;
      width: 100vw;
      margin: 0;
      padding: 0;
      background: #181818;
      color: #7fd3ff;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'Manrope', Arial, sans-serif;
    }
    .main-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      min-height: 100vh;
      width: 100vw;
    }
    .control-title {
      font-size: 2em;
      font-weight: 700;
      color: #7fd3ff;
      margin-bottom: 18px;
      background: #181818;
      padding: 12px 32px;
      border-radius: 16px;
      box-shadow: 0 2px 8px #0003;
      border: 2px solid #7fd3ff;
      text-align: center;
    }
    .remote-square-panel {
      background: #444;
      border-radius: 32px;
      border: 2px solid #7fd3ff;
      box-shadow: 0 8px 32px #0006;
      width: 320px;
      height: 320px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      gap: 0;
    }
    .remote-center {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: #217193;
      border: 2px solid #173d66;
      box-shadow: 0 0 16px #7fd3ff55, 0 2px 8px #0003;
      transition: background 0.18s, box-shadow 0.18s, border-color 0.18s, transform 0.18s;
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      touch-action: none;
    }
    .remote-bottom-row-outside {
      display: flex;
      flex-direction: row;
      gap: 32px;
      justify-content: center;
      margin-top: 32px;
    }
    .remote-btn {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: #444;
      border: 2px solid #7fd3ff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.18s, box-shadow 0.18s, border-color 0.18s;
      padding: 0;
      box-shadow: 0 2px 8px #0003;
    }
    .remote-btn:active {
      background: #222;
      box-shadow: 0 1px 4px #0004, 0 0 16px #7fd3ff55;
      border-color: #4fa2e0;
    }
    .remote-btn svg {
      display: block;
    }
    @media (max-width: 600px) {
      .remote-square-panel {
        width: 98vw;
        height: 98vw;
        padding: 12px 4px;
      }
      .remote-btn, .remote-center {
        width: 38px;
        height: 38px;
      }
      .control-title {
        font-size: 1.1em;
        padding: 8px 12px;
        border-radius: 10px;
      }
      .remote-bottom-row-outside {
        gap: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="main-center">
    <div class="control-title">Control Remoto</div>
    <div class="remote-square-panel">
      <button class="remote-btn remote-center" id="btnCenter" aria-label="Centro"></button>
    </div>
    <div class="remote-bottom-row-outside">
      <button class="remote-btn" id="playBtn" aria-label="Play">
        <svg width="28" height="28" viewBox="0 0 28 28"><polygon points="8,6 22,14 8,22" stroke="#7fd3ff" stroke-width="2" fill="none"/></svg>
      </button>
      <button class="remote-btn" id="pauseBtn" aria-label="Pause">
        <svg width="28" height="28" viewBox="0 0 28 28"><rect x="8" y="6" width="4" height="16" rx="1" stroke="#7fd3ff" stroke-width="2" fill="none"/><rect x="16" y="6" width="4" height="16" rx="1" stroke="#7fd3ff" stroke-width="2" fill="none"/></svg>
      </button>
    </div>
  </div>
  <script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-database-compat.js"></script>
  <script>
    // Configuración de Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyBac1VZn1kRfIu4rMSvd3MymJ0myCPgmHg",
      authDomain: "presentacion-be908.firebaseapp.com",
      databaseURL: "https://presentacion-be908-default-rtdb.firebaseio.com",
      projectId: "presentacion-be908",
      storageBucket: "presentacion-be908.appspot.com",
      messagingSenderId: "912832356787",
      appId: "1:912832356787:web:f0fcf115bdb41aff016bc6",
      measurementId: "G-LWSRES411H"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    function sendCommand(cmd) {
      if (window.db) {
        db.ref('control/comando').set({ value: cmd, timestamp: Date.now() });
      }
    }
    // Joystick táctil
    const joystick = document.getElementById('btnCenter');
    const panel = document.querySelector('.remote-square-panel');
    let dragging = false;
    let startX = 0, startY = 0;
    let panelRect, maxDist = 90;

    function getDirection(dx, dy) {
      if (Math.abs(dx) > Math.abs(dy)) {
        return dx > 0 ? 'right' : 'left';
      } else {
        return dy > 0 ? 'down' : 'up';
      }
    }

    function resetJoystick() {
      joystick.style.transform = 'translate(-50%, -50%)';
    }

    joystick.addEventListener('pointerdown', e => {
      dragging = true;
      panelRect = panel.getBoundingClientRect();
      startX = e.clientX;
      startY = e.clientY;
      joystick.setPointerCapture(e.pointerId);
    });

    joystick.addEventListener('pointermove', e => {
      if (!dragging) return;
      const dx = e.clientX - startX;
      const dy = e.clientY - startY;
      let dist = Math.sqrt(dx*dx + dy*dy);
      if (dist > maxDist) {
        const angle = Math.atan2(dy, dx);
        dist = maxDist;
        const nx = Math.cos(angle) * dist;
        const ny = Math.sin(angle) * dist;
        joystick.style.transform = `translate(calc(-50% + ${nx}px), calc(-50% + ${ny}px))`;
      } else {
        joystick.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
      }
    });

    joystick.addEventListener('pointerup', e => {
      if (!dragging) return;
      dragging = false;
      const dx = e.clientX - startX;
      const dy = e.clientY - startY;
      if (Math.abs(dx) > 20 || Math.abs(dy) > 20) {
        const dir = getDirection(dx, dy);
        sendCommand(dir);
      } else {
        sendCommand('center');
      }
      resetJoystick();
    });

    joystick.addEventListener('pointercancel', resetJoystick);
    joystick.addEventListener('mouseleave', resetJoystick);

    document.getElementById('playBtn').onclick = () => sendCommand('speak');
    document.getElementById('pauseBtn').onclick = () => sendCommand('pause');
    function sendCommand(cmd) {
      if (window.db) {
        db.ref('control/comando').set({ value: cmd, timestamp: Date.now() });
      }
    }
  </script>
</body>
</html>
