<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Henry Alejandro Rozo Torres | Assessment Center</title>
	<link rel="icon" href="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f4bb.svg" type="image/svg+xml" />
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet" />
	<script src="https://unpkg.com/feather-icons"></script>
	<style>
		:root {
			--bg-a: #0f2342;
			--bg-b: #11689c;
			--bg-c: #3bb7ec;
			--surface: rgba(8, 26, 44, 0.66);
			--surface-hover: rgba(10, 33, 56, 0.86);
			--surface-soft: rgba(10, 36, 58, 0.58);
			--border: rgba(121, 214, 255, 0.34);
			--title: #f5fbff;
			--text: #d8e9f8;
			--accent: #66d2ff;
			--ok: #67f2bf;
			--shadow: 0 24px 48px rgba(3, 11, 20, 0.35);
			--font-title: 'Sora', sans-serif;
			--font-body: 'Manrope', sans-serif;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			min-height: 100vh;
			font-family: var(--font-body);
			color: var(--text);
			font-size: 20px;
			background:
				radial-gradient(1100px 680px at 84% 14%, rgba(93, 211, 255, 0.32), transparent 62%),
				radial-gradient(900px 560px at 14% 74%, rgba(37, 150, 214, 0.26), transparent 66%),
				linear-gradient(130deg, var(--bg-a) 0%, var(--bg-b) 56%, var(--bg-c) 100%);
			overflow: hidden;
		}

		.layout {
			width: 100vw;
			height: 100vh;
			padding: 32px 38px 24px;
			display: grid;
			grid-template-rows: auto minmax(320px, 1fr) minmax(320px, 1fr) auto;
			gap: 18px;
			animation: fade-in 620ms ease;
		}

		.hero {
			text-align: center;
			margin-top: -2px;
		}

		.hero h1 {
			margin: 0;
			font-family: var(--font-title);
			color: var(--title);
			letter-spacing: 0.6px;
			font-size: clamp(30px, 4vw, 56px);
			font-weight: 800;
			text-shadow: 0 6px 20px rgba(8, 24, 40, 0.45);
		}

		.hero p {
			margin: 8px 0 0;
			color: #d4e8f7;
			font-size: clamp(17px, 1.5vw, 24px);
			font-weight: 600;
		}

		.cards {
			display: flex;
			gap: 12px;
			align-items: stretch;
			justify-content: center;
			overflow-x: auto;
			overflow-y: hidden;
			padding: 4px 2px;
			scroll-snap-type: x mandatory;
			height: 100%;
		}

		.cards::-webkit-scrollbar {
			height: 9px;
		}

		.cards::-webkit-scrollbar-thumb {
			background: rgba(182, 231, 255, 0.45);
			border-radius: 999px;
		}

		.card-btn {
			flex: 1 1 0;
			min-width: 320px;
			max-width: none;
			border: 1px solid var(--border);
			background: var(--surface-soft);
			border-radius: 18px;
			padding: 38px 28px;
			min-height: 100%;
			color: var(--text);
			text-align: left;
			font-size: 1.15em;
			cursor: pointer;
			transition: transform 220ms ease, box-shadow 220ms ease, background 220ms ease;
			scroll-snap-align: start;
			box-shadow: 0 14px 32px rgba(5, 14, 24, 0.28);
		}

		.card-btn:hover {
			transform: translateY(-4px);
			background: var(--surface-hover);
			box-shadow: 0 16px 30px rgba(4, 12, 20, 0.38);
		}

		.card-btn.active {
			border-color: #8fe5ff;
			background: var(--surface);
			box-shadow: 0 0 0 2px rgba(100, 219, 255, 0.22), var(--shadow);
			transform: translateY(-3px);
		}

		.card-head {
			display: flex;
			align-items: center;
			gap: 10px;
			margin-bottom: 18px;
			color: var(--accent);
			font-weight: 800;
			font-size: 40px;
			font-family: var(--font-title);
			line-height: 1.1;
		}

		.card-preview {
			margin: 0;
			padding-left: 0;
			color: #d9edfa;
			line-height: 1.5;
			font-size: 22px;
			font-weight: 600;
			max-width: 98%;
		}

		.detail-panel {
			border: 1px solid var(--border);
			border-radius: 22px;
			background: var(--surface);
			box-shadow: var(--shadow);
			padding: 24px 32px 20px;
			display: grid;
			grid-template-rows: auto auto 1fr auto;
			gap: 12px;
			min-height: 100%;
			max-height: none;
			overflow: auto;
		}

		.detail-top {
			display: flex;
			justify-content: space-between;
			align-items: center;
			gap: 10px;
		}

		.detail-title {
			margin: 0;
			font-family: var(--font-title);
			color: #f3fbff;
			font-size: clamp(22px, 2.4vw, 32px);
			font-weight: 700;
			letter-spacing: 0.3px;
		}

		.speak-btn {
			border: 1px solid #7adfff;
			background: rgba(20, 126, 177, 0.28);
			color: #e9f8ff;
			font-family: var(--font-body);
			font-weight: 700;
			border-radius: 10px;
			padding: 8px 12px;
			display: inline-flex;
			align-items: center;
			gap: 8px;
			cursor: pointer;
			transition: background 180ms ease;
		}

		.speak-btn:hover {
			background: rgba(25, 150, 208, 0.48);
		}

		.pitch {
			margin: 0;
			color: #e5f4ff;
			font-size: clamp(14px, 1.05vw, 16px);
			font-weight: 600;
			line-height: 1.35;
		}

		.micro-grid {
			display: grid;
			grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
			gap: 18px;
			min-height: 0;
			margin-top: 16px;
		}

		.micro-card {
			border: 1px solid rgba(129, 213, 252, 0.3);
			background: rgba(10, 44, 70, 0.54);
			border-radius: 16px;
			padding: 18px 18px;
			display: flex;
			flex-direction: column;
			justify-content: center;
			min-height: 110px;
			font-size: 1.1em;
			transition: transform 180ms ease, background 180ms ease;
		}

		.micro-card:hover {
			transform: translateY(-2px);
			background: rgba(14, 56, 87, 0.7);
		}

		.micro-label {
			margin: 0 0 8px;
			font-size: 15px;
			font-weight: 800;
			letter-spacing: 0.7px;
			text-transform: uppercase;
			color: var(--ok);
		}

		.micro-value {
			margin: 0;
			color: #e7f5ff;
			font-weight: 700;
			line-height: 1.32;
			font-size: 20px;
		}

		.timeline {
			margin-top: 8px;
			display: flex;
			justify-content: center;
			gap: 16px;
			flex-wrap: wrap;
			color: #d9edfb;
			font-weight: 700;
			font-size: 14px;
		}

		.step {
			border: 1px solid rgba(148, 223, 255, 0.36);
			background: rgba(12, 50, 77, 0.48);
			border-radius: 999px;
			padding: 6px 12px;
			transition: 220ms ease;
			display: flex;
			align-items: center;
			justify-content: center;
			text-align: center;
			min-width: 120px;
			font-weight: 600;
		}

		.step.active {
			border-color: #88e7ff;
			color: #041729;
			background: linear-gradient(120deg, #80e7ff, #5ed7ff);
			box-shadow: 0 0 0 2px rgba(94, 214, 255, 0.2);
		}

		.footer {
			text-align: center;
			color: #eaf8ff;
			font-weight: 700;
			letter-spacing: 0.4px;
			font-size: 18px;
			text-shadow: 0 4px 16px rgba(8, 24, 38, 0.34);
			padding-bottom: 2px;
		}

		@keyframes fade-in {
			from {
				opacity: 0;
				transform: translateY(18px);
			}
			to {
				opacity: 1;
				transform: translateY(0);
			}
		}

		@media (max-width: 1050px) {
			body {
				overflow: auto;
			}

			.layout {
				min-height: 100vh;
				height: auto;
				overflow: visible;
				grid-template-rows: auto auto auto auto;
			}

			.micro-grid {
				grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
				gap: 8px;
			}

			.detail-panel {
				min-height: 260px;
				max-height: none;
			}

			.card-btn {
				flex: 0 0 280px;
				min-width: 280px;
				max-width: 280px;
				min-height: 220px;
				padding: 24px 18px;
			}

			.card-head {
				font-size: 30px;
			}

			.card-preview {
				font-size: 15px;
			}
		}
	</style>
</head>
<body>
	<main class="layout">
		<header class="hero">
			<h1>Henry Alejandro Rozo Torres</h1>
			<p>Me apasiona analizar a fondo cada actividad, optimizar procesos y automatizarlos para eliminar errores manuales.</p>
		</header>

		<section class="cards" aria-label="Secciones de presentacion">
			<button class="card-btn active" data-section="perfil">
				<div class="card-head">¿Quién soy?</div>
				<p class="card-preview">Soy Alejandro y estoy enfocado en convertir la gestion de procesos en datos claros, mejoras reales y resultados para el equipo.</p>
			</button>

			<button class="card-btn" data-section="experiencia">
				<div class="card-head">Proyectos en Belcorp</div>
				<p class="card-preview">He impulsado iniciativas de exactitud y trazabilidad que fortalecen inventarios, control de movimientos y eficiencia de procesos.</p>
			</button>

			<button class="card-btn" data-section="automatizacion">
				<div class="card-head">Metas</div>
				<p class="card-preview">Quiero crecer hacia Master Data Technical integrando automatizacion, calidad de datos y enfoque en impacto de negocio.</p>
			</button>

			<button class="card-btn" data-section="habilidades">
				<div class="card-head">Habilidades</div>
				<p class="card-preview">Combino SAP, Python y analisis con comunicacion y trabajo en equipo para convertir datos en decisiones.</p>
			</button>

			<button class="card-btn" data-section="formacion">
				<div class="card-head">Formación</div>
				<p class="card-preview">Mantengo preparacion constante en lo tecnico y humano para adaptarme rapido y aportar cada vez mas valor.</p>
			</button>
		</section>

		<section class="detail-panel" aria-live="polite">
			<div class="detail-top">
				<h2 class="detail-title" id="detailTitle">¿Quién soy?</h2>
				<button class="speak-btn" id="speakBtn" type="button">
					<i data-feather="volume-2"></i>
					Escuchar resumen
				</button>
			</div>

			<p class="pitch" id="detailPitch"></p>

			<div class="micro-grid" id="microGrid"></div>

			<div class="timeline" id="timeline">
				<span class="step" data-step="0">Administración</span>
				<span class="step" data-step="1">Control y exactitud</span>
				<span class="step" data-step="2">Automatizacion</span>
				<span class="step" data-step="3">Master Data</span>
			</div>
		</section>

		<div class="footer">Transformando procesos en datos confiables y decisiones precisas</div>
	</main>

	<script>
		const sectionData = {
			perfil: {
				title: '¿Quién soy?',
				stage: 0,
				pitch: 'Soy Alejandro y enfoco mi gestion en ordenar procesos, dar claridad al dato y generar mejoras que sumen al equipo.',
				micro: [
					{ label: 'Fortaleza', value: 'Analisis y enfoque' },
					{ label: 'Estilo', value: 'Orden y disciplina' },
					{ label: 'Valor', value: 'Confianza en el dato' },
					{ label: 'Actitud', value: 'Aprendizaje constante' },
					{ label: 'En equipo', value: 'Colaboracion y respeto' },
					{ label: 'Resultado', value: 'Mejoras concretas' }
				],
				speech: 'Soy Alejandro y estoy enfocado en mejorar la administracion con datos confiables, trazabilidad y soluciones practicas que generen resultados.'
			},
			experiencia: {
				title: 'Proyectos en Belcorp',
				stage: 1,
				pitch: 'En Belcorp he liderado iniciativas que mejoran control, exactitud y trazabilidad en procesos clave de materiales.',
				micro: [
					{ label: 'Proyecto', value: 'Rol ERI' },
					{ label: 'Impacto', value: 'Exactitud de inventarios' },
					{ label: 'Proyecto', value: 'Conciliaciones' },
					{ label: 'Impacto', value: 'Consistencia de materiales' },
					{ label: 'Enfoque', value: 'Control de movimientos' },
					{ label: 'Resultado', value: 'Menos reprocesos' }
				],
				speech: 'Mis proyectos en Belcorp se enfocan en exactitud de inventarios, trazabilidad y mejora de procesos con impacto directo en la ejecución.'
			},
			automatizacion: {
				title: 'Metas',
				stage: 2,
				pitch: 'Mi ruta profesional apunta a Master Data Technical, combinando administracion, automatizacion y calidad de informacion.',
				micro: [
					{ label: 'Corto plazo', value: 'Automatizar tareas clave' },
					{ label: 'Mediano plazo', value: 'Profundizar en calidad de datos' },
					{ label: 'Largo plazo', value: 'Consolidarme en Master Data' },
					{ label: 'Foco', value: 'Datos para decidir mejor' },
					{ label: 'Aporte', value: 'Eficiencia sostenible' },
					{ label: 'Motivacion', value: 'Mejora continua' }
				],
				speech: 'Mis metas están enfocadas en crecer hacia Master Data, combinando automatización, control y confiabilidad de información.'
			},
			habilidades: {
				title: 'Habilidades',
				stage: 3,
				pitch: 'Integro habilidades tecnicas y humanas para traducir informacion en decisiones utiles para el negocio.',
				micro: [
					{ label: 'Tecnico', value: 'SAP, Python y Excel' },
					{ label: 'Analisis', value: 'Lectura de datos' },
					{ label: 'Calidad', value: 'Atencion al detalle' },
					{ label: 'Comunicacion', value: 'Mensajes claros' },
					{ label: 'Equipo', value: 'Colaboracion activa' },
					{ label: 'Gestion', value: 'Enfoque a resultados' }
				],
				speech: 'Aporto habilidades técnicas y blandas para mejorar procesos, elevar la calidad de datos y trabajar de forma colaborativa.'
			},
			formacion: {
				title: 'Formación',
				stage: 3,
				pitch: 'Mantengo una preparacion constante para fortalecer mi criterio administrativo, tecnico y personal.',
				micro: [
					{ label: 'Mentalidad', value: 'Aprender siempre' },
					{ label: 'Base', value: 'Formacion en gestion' },
					{ label: 'Refuerzo', value: 'Practica aplicada' },
					{ label: 'Desarrollo', value: 'Adaptabilidad' },
					{ label: 'Proposito', value: 'Aportar mas valor' },
					{ label: 'Proyeccion', value: 'Crecimiento profesional' }
				],
				speech: 'Mantengo una preparación constante para crecer técnica y profesionalmente, con foco en aportar más valor en roles de datos y procesos.'
			}
		};

		const cards = Array.from(document.querySelectorAll('.card-btn'));
		const detailTitle = document.getElementById('detailTitle');
		const detailPitch = document.getElementById('detailPitch');
		const microGrid = document.getElementById('microGrid');
		const speakBtn = document.getElementById('speakBtn');
		const timelineSteps = Array.from(document.querySelectorAll('.step'));
		let activeSection = 'perfil';

		function updateTimeline(stage) {
			timelineSteps.forEach((step, index) => {
				if (index <= stage) {
					step.classList.add('active');
				} else {
					step.classList.remove('active');
				}
			});
		}

		function renderSection(sectionKey) {
			const data = sectionData[sectionKey];
			if (!data) {
				return;
			}

			activeSection = sectionKey;
			detailTitle.textContent = data.title;
			detailPitch.textContent = data.pitch;

			microGrid.innerHTML = data.micro
				.map((item) => `
					<article class="micro-card">
						<p class="micro-label">${item.label}</p>
						<p class="micro-value">${item.value}</p>
					</article>
				`)
				.join('');

			cards.forEach((card) => {
				card.classList.toggle('active', card.dataset.section === sectionKey);
			});

			updateTimeline(data.stage);
			feather.replace();
		}

		function speakSummary() {
			const data = sectionData[activeSection];
			if (!data || !('speechSynthesis' in window)) {
				return;
			}

			window.speechSynthesis.cancel();
			const utterance = new SpeechSynthesisUtterance(data.speech);
			utterance.lang = 'es-CO';
			utterance.rate = 0.98;
			utterance.pitch = 1;
			window.speechSynthesis.speak(utterance);
		}

		cards.forEach((card) => {
			card.addEventListener('click', () => {
				renderSection(card.dataset.section);
			});
		});

		speakBtn.addEventListener('click', speakSummary);

		renderSection('perfil');
		feather.replace();
	</script>
</body>
</html>
